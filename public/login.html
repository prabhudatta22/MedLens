<!DOCTYPE html>
<html lang="en-IN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MedLens — login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <header class="header">
      <div class="brand">
        <span class="logo" aria-hidden="true">◇</span>
        <div>
          <h1>MedLens</h1>
          <p class="tagline">Login with mobile OTP</p>
        </div>
      </div>
      <p class="disclaimer">India numbers only for now. OTP delivery is dev-mode unless you plug in an SMS provider.</p>
    </header>

    <main class="layout" style="grid-template-columns: 1fr; max-width: 640px">
      <section class="panel">
        <h2>Request OTP</h2>
        <label class="field">
          <span>Mobile number</span>
          <input id="phone" inputmode="tel" placeholder="e.g. 9876543210" />
        </label>
        <button class="btn" id="request">Send OTP</button>
        <pre id="reqOut" class="muted" style="white-space: pre-wrap; margin-top: 0.8rem"></pre>
      </section>

      <section class="panel">
        <h2>Verify OTP</h2>
        <label class="field">
          <span>OTP</span>
          <input id="code" inputmode="numeric" placeholder="6-digit code" />
        </label>
        <button class="btn" id="verify">Verify & login</button>
        <button class="btn" id="logout" style="margin-left: 0.5rem">Logout</button>
        <pre id="verOut" class="muted" style="white-space: pre-wrap; margin-top: 0.8rem"></pre>
      </section>
    </main>

    <footer class="footer">
      <a class="muted" href="/" style="color: inherit">Back to search</a>
    </footer>

    <script type="module" src="/login.js"></script>
  </body>
</html>
