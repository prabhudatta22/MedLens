services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medlens
      POSTGRES_PASSWORD: medlens
      POSTGRES_DB: medlens
    ports:
      - "5432:5432"
    volumes:
      - medlens_pg:/var/lib/postgresql/data

  redis:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    command: ["valkey-server", "--save", "60", "1", "--loglevel", "warning"]

volumes:
  medlens_pg:
